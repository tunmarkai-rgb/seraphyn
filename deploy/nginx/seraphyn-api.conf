# Alternate example only:
# This Nginx config is not used on the current production droplet,
# because that host already routes public traffic through Docker + Caddy.
# Keep this file only as a reference for a future non-Caddy deployment.

server {
    listen 80;
    server_name api.seraphyncare.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
